<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS: Debouncing & Throttle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-weight: 200;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            background: #333;
            color: #fff;
        }

        input {
            margin: 1rem;
            border: none;
            outline: none;
            padding: 0.5rem 1rem;
            border-radius: 1rem;
        }

        #result {
            border-radius: 1rem;
            height: 50vh;
            width: 100vw;
            background: #fff;
            margin-top: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000;
            font-size: 3rem;
        }

        #scroll {
            height: 200vh;
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            background: crimson;
            margin: 1.5rem;
            border-radius: 0.5rem;
        }
    </style>
</head>

<body>
    <!-- debouncing example -->
    <input type="text" name="search" id="search" placeholder="search...">
    <div id="result">

    </div>

    <!-- throttle example -->
    <div id="scroll">
        Scroll me
    </div>
    <script>
        let searchField = document.querySelector('#search');
        let resultField = document.querySelector('#result');
        let scrollBtn = document.querySelector('#scroll');
        function debounce(fnc, delay) {
            let timer;
            return function (...args) {
                clearTimeout(timer);
                timer = setTimeout(() => {
                    fnc(...args);
                }, delay)
            }
        }

        function throttle(fnc, delay) {
            let lastTime = 0;
            return function (...args) {
                let now = Date.now();
                if (now - lastTime >= delay) {
                    lastTime = now;
                    fnc(...args);
                }
            }
        }
        searchField.addEventListener("input", debounce(function (e) {
            resultField.textContent = `Searching for: ${e.target.value}`;
        }, 1000));
        searchField.addEventListener("input", function(){
            resultField.textContent = `typing...`;
        })
        let count = 0;
        window.addEventListener("scroll", throttle(function (...args) {
            scrollBtn.textContent = `scrolling..${++count}`;

        }, 1000))
    </script>
</body>

</html>
