<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Card UI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.8.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="main">
        <div id="card">
            <div id="content">
                <div id="text">
                    <h1>Natasha Romanoff <i class="ri-verified-badge-fill"></i> </h1>
                    <p>I'm a Brand Designer who focuses on clarity<br>& emotional connection.</p>
                </div>
                <div id="review">
                    <div id="rating">
                        <div><i class="ri-star-fill"></i>4.8</div>
                        <div>Rating</div>
                    </div>
                    <hr>
                    <div id="earned">
                        <div>$45k+</div>
                        <div>Earned</div>
                    </div>
                    <hr>
                    <div id="rate">
                        <div>$50/hr</div>
                        <div>Rate</div>
                    </div>
                </div>
                <div id="button">
                    <button id="email"><i class="ri-mail-line"></i>Get in Touch</button>
                    <button id="save"><i class="ri-bookmark-line"></i></button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
