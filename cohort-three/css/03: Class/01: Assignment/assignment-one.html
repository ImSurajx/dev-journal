<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>ScaleX</title>
  </head>
  <body>
    <div class="app">
      <!-- ========================= -->
      <!-- Header -->
      <!-- ========================= -->
      <header class="header">
        <div class="container">
          <div class="logo">
            <div class="logo-icon">
              <div class="logo-create">
                <i class="ri-arrow-left-double-line"></i
                ><i class="ri-arrow-right-double-line"></i>
              </div>
            </div>
            <span class="logo-text">ScaleX</span>
          </div>

          <nav class="navbar">
            <ul class="nav-list">
              <li class="nav-item">
                <a href="#" class="nav-link">Home</a>
              </li>

              <li class="nav-item">
                <a href="#" class="nav-link">About Us</a>
              </li>

              <li class="nav-item">
                <a href="#" class="nav-link">Blogs</a>
              </li>

              <li class="nav-item">
                <a href="#" class="nav-link">Contact Us</a>
              </li>
            </ul>
          </nav>

          <button class="header-btn">Get Started</button>
        </div>
      </header>

      <!-- ========================= -->
      <!-- Blog Section -->
      <!-- ========================= -->
      <main class="blog-page">
        <section class="blog-section">
          <div class="container">
            <!-- Heading -->
            <div class="section-heading">
              <h1 class="main-title">Insights & Blogs</h1>
            </div>

            <!-- Filter Buttons -->
            <div class="blog-filters">
              <button class="filter-btn active">All</button>

              <button class="filter-btn">Tech</button>

              <button class="filter-btn">SaaS</button>

              <button class="filter-btn">Marketing</button>
            </div>

            <!-- Blog Cards -->
            <div class="blog-grid">
              <!-- Card 1 -->
              <article class="blog-card">
                <div class="blog-image">
                  <img src="https://images.unsplash.com/photo-1761361326803-7f413d7926b0?q=80&w=2370&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Tech Blog" />
                </div>

                <div class="blog-content">
                  <span class="blog-tag"> Tech </span>

                  <h2 class="blog-title">
                    The Ultimate Guide To<br> SaaS Marketing
                  </h2>

                  <p class="blog-date">May 23, 2025</p>
                </div>
              </article>

              <!-- Card 2 -->
              <article class="blog-card">
                <div class="blog-image">
                  <img src="https://images.unsplash.com/photo-1757957789192-e055c60d7f49?q=80&w=2370&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="SaaS Blog" />
                </div>

                <div class="blog-content">
                  <span class="blog-tag"> SaaS </span>

                  <h2 class="blog-title">
                    5 Key Trends In SaaS<br> Growth For 2025
                  </h2>

                  <p class="blog-date">May 23, 2025</p>
                </div>
              </article>

              <!-- Card 3 -->
              <article class="blog-card">
                <div class="blog-image">
                  <img src="https://plus.unsplash.com/premium_photo-1709384735352-be811fd15b97?q=80&w=2759&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Marketing Blog" />
                </div>

                <div class="blog-content">
                  <span class="blog-tag"> Marketing </span>

                  <h2 class="blog-title">
                    How Data-Driven<br> Strategies Are Important
                  </h2>

                  <p class="blog-date">May 23, 2025</p>
                </div>
              </article>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
